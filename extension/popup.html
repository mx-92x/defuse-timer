<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 288px; margin: 0; padding: 13px 18px;
      font: 13px/1.35 "Segoe UI", system-ui, sans-serif;
      color: #e7ecf3;
      /* Diagonal navy -> indigo gradient + a cyan glow bleeding from top-right. */
      background:
        radial-gradient(130% 80% at 100% 0%, rgba(34, 211, 238, 0.20), transparent 55%),
        linear-gradient(160deg, #0b1220 0%, #141a33 45%, #2c2156 100%);
    }

    /* Header */
    h1 { font-size: 20px; font-weight: 800; margin: 0; letter-spacing: -0.3px;
      color: #f8fafc; }
    .sub { color: #8b97ad; font-size: 11px; margin: 3px 0 11px; }

    /* Frosted card */
    .card {
      background: rgba(148, 163, 184, 0.09);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 12px;
      padding: 11px 12px;
      margin-bottom: 9px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
    }

    /* Game field */
    .field label { display: block; font-size: 10px; letter-spacing: 0.4px;
      text-transform: uppercase; color: #8b97ad; margin-bottom: 4px; }
    select {
      width: 100%; appearance: none; -webkit-appearance: none;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: #f1f5f9; font: inherit; font-size: 14px; font-weight: 600;
      border-radius: 9px; padding: 8px 32px 8px 12px; cursor: pointer;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%238b97ad' stroke-width='2'><path d='M4 6l4 4 4-4'/></svg>");
      background-repeat: no-repeat; background-position: right 11px center;
    }
    select:focus { outline: none; border-color: rgba(34, 211, 238, 0.6); }

    /* Sliders */
    .slider + .slider { margin-top: 12px; }
    .srow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .sname { font-size: 13px; font-weight: 600; color: #e7ecf3; }
    .val { font-size: 11.5px; font-weight: 700; color: #cdeefb;
      background: rgba(15, 23, 42, 0.55); border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 7px; padding: 2px 8px; min-width: 36px; text-align: center; }
    input[type=range] { -webkit-appearance: none; appearance: none;
      width: 100%; height: 16px; background: transparent; cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track {
      height: 6px; border-radius: 999px;
      background: linear-gradient(to right,
        #22d3ee 0%, #38bdf8 var(--pct, 50%),
        rgba(255, 255, 255, 0.13) var(--pct, 50%), rgba(255, 255, 255, 0.13) 100%);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; margin-top: -5px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #bfe6f2; border: 2px solid #22d3ee;
      box-shadow: 0 0 5px 1px rgba(34, 211, 238, 0.42);
    }

    /* Buttons */
    button { border: 0; border-radius: 10px; font: inherit; cursor: pointer; }
    .row { display: flex; gap: 9px; margin-bottom: 8px; }
    #start { flex: 1.6; padding: 9px; font-size: 13px; font-weight: 700;
      color: #052e16; background: linear-gradient(180deg, #28c065, #20b058);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25); }
    #stop { flex: 1; padding: 9px; font-size: 13px; font-weight: 600;
      color: #e7ecf3; background: rgba(100, 116, 139, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.2); }
    #plant { width: 100%; padding: 10px; font-size: 13.5px; font-weight: 700;
      color: #fff; background: linear-gradient(180deg, #e9495c, #d62c46);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25); }
    button:hover { filter: brightness(1.07); }
    button:active { transform: translateY(1px); }

    .check { display: flex; align-items: center; gap: 7px; margin-top: 11px;
      font-size: 11px; color: #8b97ad; cursor: pointer; user-select: none; }
    .check input { accent-color: #22d3ee; cursor: pointer; }
    #status { margin-top: 11px; font-size: 11px; color: #7b8499; }
    #keys { margin-top: 6px; font-size: 10px; color: #6b768c; }
  </style>
</head>
<body>
  <h1>Defuse Time</h1>
  <div class="sub">Spike &amp; bomb countdown for stream viewers</div>

  <div class="card field">
    <label for="game">Game</label>
    <select id="game">
      <option value="valorant">Valorant — 45s spike</option>
      <option value="cs2">CS2 — 40s bomb</option>
    </select>
  </div>

  <div class="card">
    <div class="slider">
      <div class="srow"><span class="sname">Detection threshold</span><span id="thVal" class="val"></span></div>
      <input type="range" id="threshold">
    </div>
    <div class="slider">
      <div class="srow"><span class="sname">Round cooldown</span><span id="cdVal" class="val"></span></div>
      <input type="range" id="cooldown" min="0" max="40" step="1">
    </div>
  </div>

  <div class="row">
    <button id="start">Start watching</button>
    <button id="stop">Stop</button>
  </div>
  <button id="plant">Plant now</button>

  <label class="check"><input type="checkbox" id="debug"> Debug overlay (ROI boxes + values)</label>

  <div id="status">Open a Valorant/CS2 stream, pick the game, Start.</div>
  <div id="keys">Hotkeys: Alt+P plant · Alt+C reset · Alt+X close</div>
  <script src="popup.js"></script>
</body>
</html>
